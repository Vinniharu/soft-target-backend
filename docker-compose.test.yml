services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: softtarget_test
      POSTGRES_PASSWORD: softtarget_test
      POSTGRES_DB: softtarget_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U softtarget_test -d softtarget_test"]
      interval: 2s
      timeout: 3s
      retries: 10
